<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fusion Research Facility</title>

<style>
  body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0b0f19;
    color:white;
    text-align:center;
  }

  /* ===== NAVBAR ===== */
  .navbar{
    display:flex;
    justify-content:center;
    gap:40px;
    padding:18px;
    background:#0f1629;
    font-weight:bold;
    letter-spacing:1px;
  }

  .navbar a{
    color:white;
    text-decoration:none;
    transition:0.2s;
  }

  .navbar a:hover{
    color:#6aa7ff;
  }

  /* ===== LOGO ===== */
  .logo{
    margin-top:25px;
  }

  .logo img{
    width:140px;
  }

  .title{
    font-size:28px;
    margin-top:10px;
    font-weight:bold;
    letter-spacing:2px;
  }

  /* ===== STAFF GRID ===== */
  .staff-section{
    margin-top:50px;
    padding:20px;
  }

  .staff-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
    gap:25px;
    max-width:900px;
    margin:auto;
  }

  .staff-card{
    background:#121a2f;
    padding:18px;
    border-radius:14px;
    transition:0.25s;
  }

  .staff-card:hover{
    transform:translateY(-4px);
    background:#182241;
  }

  .staff-card img{
    width:110px;
    height:110px;
    border-radius:50%;
    margin-bottom:10px;
  }
</style>
</head>

<body>

<!-- ===== NAV ===== -->
<div class="navbar">
  <a href="#">FUSION RESEARCH FACILITY</a>
  <a href="#">ABOUT</a>
  <a href="#">STAFF</a>
</div>

<!-- ===== LOGO UNDER NAV ===== -->
<div class="logo">
  <!-- PUT YOUR logo.png IN SAME FOLDER -->
  <img src="logo.png" alt="Logo">
  <div class="title">FUSION RESEARCH FACILITY</div>
</div>

<!-- ===== STAFF ===== -->
<div class="staff-section">
  <h2>Staff Team</h2>
  <div class="staff-grid" id="staffGrid"></div>
</div>

<script>
// ============================================
// 🔥 ONLY EDIT USER IDS + NAMES HERE
// ============================================

const staffMembers = [
  { name:"OwnerName", role:"Owner", userId:1 },
  { name:"DevName", role:"Developer", userId:2 },
  { name:"ModName", role:"Moderator", userId:3 }
];

// ============================================
// DO NOT TOUCH BELOW (it works)
// ============================================

function createCard(member){
  const card = document.createElement('div');
  card.className = 'staff-card';

  const img = document.createElement('img');

  // ⭐ MOST RELIABLE ROBLOX HEADSHOT
  if(member.userId && member.userId !== 0){
    img.src = `https://www.roblox.com/headshot-thumbnail/image?userId=${member.userId}&width=150&height=150&format=png`;
  } else {
    img.src = "https://via.placeholder.com/150?text=No+ID";
  }

  img.onerror = () => {
    img.src = "https://via.placeholder.com/150?text=No+Avatar";
  };

  const name = document.createElement('div');
  name.textContent = member.name;

  const role = document.createElement('div');
  role.style.opacity = "0.7";
  role.style.fontSize = "13px";
  role.textContent = member.role;

  card.appendChild(img);
  card.appendChild(name);
  card.appendChild(role);

  return card;
}

const grid = document.getElementById('staffGrid');
staffMembers.forEach(m => {
  grid.appendChild(createCard(m));
});
</script>

</body>
</html>
